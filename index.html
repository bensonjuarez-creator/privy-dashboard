    type,

    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend: opts.legend || {display:false},
        tooltip:{callbacks:{label:c=>fmtA(c.parsed.y,fmt)}}
      },
      scales: type==="doughnut"?{}:{
        x:{ticks:{font:{size:10},maxRotation:35},grid:{display:false}},
        y:{ticks:{font:{size:10},callback:v=>fmtA(v,fmt)},grid:{color:"#f4f4f4"}}
      },
      ...opts
    }
  });
}

function bar(key, color) {
  return {data:CHART_WEEKS.map(w=>w[key]),backgroundColor:color,borderRadius:5,borderSkipped:false};
}
function line(key, color) {
  return {data:CHART_WEEKS.map(w=>w[key]),borderColor:color,backgroundColor:color+"18",
           borderWidth:2,pointRadius:4,tension:.3,fill:true,spanGaps:true};
}

function mkDoughnut(id, data, labels, colors) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  if (_charts[id]) _charts[id].destroy();
  _charts[id] = new Chart(ctx, {
    type:"doughnut",
    data:{labels, datasets:[{data,backgroundColor:colors,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:"bottom",labels:{font:{size:11}}}}}
  });
}

function renderCharts(idx) {
  const w = CHART_WEEKS[idx];
  mkChart("c-rev",   "bar",  [bar("totalRevenue",C.purple)],             "dollar");
  mkChart("c-nsrev", "bar",  [bar("newSubRev",C.teal)],                  "dollar");
  mkChart("c-nsubs", "bar",  [bar("newSubs",C.purple)],                  "integer");
  mkChart("c-cxl",   "bar",  [bar("cancellations",C.red)],               "integer");
  mkChart("c-risk",  "bar",  [bar("atRisk",C.amber)],                    "dollar");
  mkChart("c-mrr",   "bar",  [bar("mrr",C.purple)], "dollar");
  mkChart("c-arr",   "line", [line("annualizedMrr",C.teal),line("committedArr",C.green)], "dollar");
  mkDoughnut("c-split",
    [w.monthlyPlanRev||0, w.annualPlanRev||0],
    ["Monthly","Annual"], [C.purple,C.teal]);
  mkDoughnut("c-mix",
    [w.monthlySubsPct||0, w.annualSubsPct||0],
    ["Monthly","Annual"], [C.purple,C.teal]);
}

function kpiCards(keys, kpis) {
  return keys.map(([ek,dl])=>{
    const k = kpis[ek]||{v:"—",w:""};
    const wc = k.w.includes("▲")?"up":k.w.includes("▼")?"down":k.w==="flat"?"flat":"";
    return `<div class="kpi"><div class="kpi-label">${dl}</div><div class="kpi-value">${k.v}</div>`+
           (k.w?`<div class="kpi-wow ${wc}">${k.w}</div>`:``)+"</div>";
  }).join("");
}

function renderKpis(idx) {
  const kd = KPI_WEEKS[idx];
  const kpis = kd.kpis;
  const w = CHART_WEEKS[idx];

  document.getElementById("warn").innerHTML = kd.missing.length
    ? `<div class="warning">⚠️ Missing data: ${kd.missing.join(", ")}</div>` : "";

  SCHEMA.forEach(sec=>{
    const el = document.getElementById("kpi-"+sec.id);
    if (el) el.innerHTML = kpiCards(sec.keys, kpis);
  });

  // Plan mix bar
  const mP = w.monthlySubsPct!=null?w.monthlySubsPct.toFixed(1):0;
  const aP = w.annualSubsPct!=null?w.annualSubsPct.toFixed(1):0;
  document.getElementById("mix-bar").innerHTML =
    `<div class="mix-bar-wrap"><div class="mix-bar-m" style="width:${mP}%"></div><div class="mix-bar-a" style="width:${aP}%"></div></div>
     <div class="mix-legend">
       <span><span class="mix-dot" style="background:#635bff"></span>Monthly ${mP}%</span>
       <span><span class="mix-dot" style="background:#00b8d4"></span>Annual ${aP}%</span>
     </div>`;
}

  document.getElementById("app").innerHTML = `
    <div id="warn"></div>

    <div class="sec-label">Revenue</div>

    <div class="chart-card">

      <div class="chart-sub">All charges across monthly and annual plans</div>
      <div class="chart-wrap" style="height:220px"><canvas id="c-rev"></canvas></div>
    </div>
    <div class="two-col">
      <div class="chart-card">
        <div class="chart-title">New subscription revenue</div>
        <div class="chart-sub">First charge from new subscribers</div>
        <div class="chart-wrap" style="height:190px"><canvas id="c-nsrev"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Monthly vs annual revenue split</div>
        <div class="chart-sub">Current week</div>
        <div class="chart-wrap" style="height:190px"><canvas id="c-split"></canvas></div>
      </div>
    </div>

    <div class="sec-label">MRR & ARR Trends</div>
    <div class="chart-card">
      <div class="chart-title">Current MRR — week over week</div>
      <div class="chart-sub">Monthly recurring revenue across all active subscribers</div>
      <div class="chart-wrap" style="height:220px"><canvas id="c-mrr"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Annualized MRR vs Committed ARR — all weeks</div>
      <div class="chart-sub">Teal = Annualized MRR (MRR × 12) &nbsp;·&nbsp; Green = Committed ARR (active annual plan amounts)</div>
      <div class="chart-wrap" style="height:220px"><canvas id="c-arr"></canvas></div>
    </div>

    <div class="sec-label">Subscriptions & MRR</div>
    <div class="kpi-grid" id="kpi-subscriptions"></div>
    <div class="two-col">
      <div class="chart-card">
        <div class="chart-title">New subscriptions added — week over week</div>
        <div class="chart-sub"></div>
        <div class="chart-wrap" style="height:190px"><canvas id="c-nsubs"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Plan mix — active subscribers</div>
        <div class="chart-sub">Monthly vs annual</div>
        <div id="mix-bar"></div>
        <div class="chart-wrap" style="height:150px"><canvas id="c-mix"></canvas></div>
      </div>
    </div>

    <div class="sec-label">Cancellations & Churn</div>
    <div class="kpi-grid" id="kpi-churn"></div>

      <div class="chart-title">Total cancellations — week over week</div>
      <div class="chart-sub">All plan types combined</div>
      <div class="chart-wrap" style="height:210px"><canvas id="c-cxl"></canvas></div>
    </div>

    <div class="sec-label">Failed Payments</div>

    <div class="chart-card">

      <div class="chart-sub">Unique subscriber balance at risk</div>
      <div class="chart-wrap" style="height:210px"><canvas id="c-risk"></canvas></div>
    </div>

    <div class="sec-label">Lifetime Value</div>
    <div class="kpi-grid" id="kpi-ltv"></div>

    <div class="note-box">
      <strong>Campaign note:</strong> Re-engagement campaign (launched Mar 24, 2026) inflated churn figures.
      236 subscribers re-engaged — cancellations reflect intentional list hygiene, not organic churn.
    </div>`;
}

function showTab(idx) {
  currentIdx = idx;
  document.querySelectorAll(".tab-btn").forEach((b,i)=>b.classList.toggle("active",i===idx));
  renderKpis(idx);
  renderCharts(idx);
}

buildShell();
showTab(currentIdx);
</script>
</body></html>
