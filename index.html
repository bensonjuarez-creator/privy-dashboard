a{color:#635bff;text-decoration:none}

const labels = WEEKS.map(w=>w.label);
let currentIdx = WEEKS.length - 1;
const chartObjs = {};

const fmtD = v => v==null ? "—" : (Math.abs(v)>=1000000 ? "$"+(v/1000000).toFixed(2)+"M" : "$"+Math.round(v).toLocaleString());
const fmtN = v => v==null ? "—" : Math.round(v).toLocaleString();
const fmtPct = v => v==null ? "—" : v.toFixed(2)+"%";
const fmtAuto = (v,fmt) => fmt==="dollar"?fmtD(v):fmt==="percent"?fmtPct(v):fmt==="integer"?fmtN(v):v==null?"—":String(v);

function barDataset(key, color) {
  return {
    data: WEEKS.map(w=>w[key]),
    backgroundColor: color,
    borderRadius: 4,
    borderSkipped: false,
  };
}

function lineDataset(key, color) {
  return {
    data: WEEKS.map(w=>w[key]),
    borderColor: color,
    backgroundColor: color+"22",
    borderWidth: 2,
    pointRadius: 4,
    tension: 0.3,
    fill: true,
    spanGaps: true,
  };
}

function chartOpts(fmt, title) {
  return {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{display:false},
      tooltip:{callbacks:{label:c=>fmtAuto(c.parsed.y,fmt)}}
    },
    scales:{
      x:{ticks:{font:{size:10},maxRotation:30},grid:{display:false}},
      y:{ticks:{font:{size:10},callback:v=>fmtAuto(v,fmt)},grid:{color:"#f0f0f0"}}
    }
  };
}

function makeChart(id, type, datasets, fmt) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  if (chartObjs[id]) chartObjs[id].destroy();
  chartObjs[id] = new Chart(ctx, {
    type, data:{labels, datasets},
    options: chartOpts(fmt)
  });
}

function makePieChart(id, dataArr, labelsArr, colors) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  if (chartObjs[id]) chartObjs[id].destroy();
  chartObjs[id] = new Chart(ctx, {
    type:"doughnut",
    data:{labels:labelsArr, datasets:[{data:dataArr,backgroundColor:colors,borderWidth:2}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:"bottom",labels:{font:{size:11}}}}
    }
  });
}

function renderCharts(idx) {
  const w = WEEKS[idx];
  // Revenue bar
  makeChart("revChart","bar",[barDataset("totalRevenue","#635bff")],"dollar");
  makeChart("newSubRevChart","bar",[barDataset("newSubRev","#00b8d4")],"dollar");
  makeChart("newSubCountChart","bar",[barDataset("newSubs","#635bff")],"integer");
  makeChart("churnChart","bar",[barDataset("cancellations","#f43f5e")],"integer");
  makeChart("atRiskChart","bar",[barDataset("atRisk","#f59e0b")],"dollar");
  makeChart("mrrChart","line",[lineDataset("mrr","#635bff"),lineDataset("annualizedMrr","#00b8d4"),lineDataset("committedArr","#16a34a")],"dollar");

  // Plan mix doughnut for current week
  const mPct = w.monthlySubsPct;
  const aPct = w.annualSubsPct;
  if (mPct!=null||aPct!=null) {
    makePieChart("mixChart",[mPct||0,aPct||0],["Monthly","Annual"],["#635bff","#00b8d4"]);
  }
  // Revenue split doughnut
  const mRev = w.monthlyPlanRev;
  const aRev = w.annualPlanRev;
  if (mRev!=null||aRev!=null) {
    makePieChart("splitChart",[mRev||0,aRev||0],["Monthly","Annual"],["#635bff","#00b8d4"]);
  }
}

function renderKpis(idx) {
  const row = KPI_ROWS[idx];
  const w = WEEKS[idx];

  // Warning
  const warnEl = document.getElementById("warn-box");
  if (row.missing.length > 0) {
    warnEl.textContent = "⚠️ Missing data: " + row.missing.join(", ");
    warnEl.style.display = "block";
  } else {
    warnEl.style.display = "none";
  }

  SCHEMA_ORDER.forEach(([sectionTitle, keys]) => {
    const gridId = "grid-" + sectionTitle.replace(/[^a-z]/gi,"_");
    const el = document.getElementById(gridId);
    if (!el) return;
    el.innerHTML = keys.map(([key, display, fmt]) => {
      const kpi = row.kpis[key] || {value:"—",wow:""};
      const wowCls = kpi.wow.includes("▲") ? "up" : kpi.wow.includes("▼") ? "down" : "neutral";
      const wowHtml = kpi.wow ? `<div class="kpi-wow ${wowCls}">${kpi.wow}</div>` : "";
      return `<div class="kpi"><div class="kpi-label">${display}</div><div class="kpi-value">${kpi.value}</div>${wowHtml}</div>`;
    }).join("");
  });

  // Plan mix bar
  const mP = w.monthlySubsPct!=null ? w.monthlySubsPct.toFixed(1) : 0;
  const aP = w.annualSubsPct!=null  ? w.annualSubsPct.toFixed(1)  : 0;
  document.getElementById("planMixBar").innerHTML = `
    <div class="mix-bar-wrap"><div class="mix-bar-m" style="width:${mP}%"></div><div class="mix-bar-a" style="width:${aP}%"></div></div>
    <div class="mix-legend">
      <span><span class="mix-dot" style="background:#635bff"></span>Monthly ${mP}%</span>
      <span><span class="mix-dot" style="background:#00b8d4"></span>Annual ${aP}%</span>
    </div>`;
}

function showTab(idx) {
  currentIdx = idx;
  document.querySelectorAll(".tab-btn").forEach((b,i)=>b.classList.toggle("active",i===idx));
  renderKpis(idx);
  renderCharts(idx);
}

buildContent();
showTab(currentIdx);
</script>
